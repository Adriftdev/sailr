schema_version = "0.5.0"
name = "{{name}}"
log_level = "INFO"
domain = "{{default_domain}}"
default_replicas = 1
registry = "{{default_registry}}"

service = []
environment_variables = []

[workflow.local-deploy]
environment = "local"
mode = "go"
interactive = true
build = "plan"
generate = "run"
deploy = "run"
deploy_context = "minikube"
namespace = "default"
approval = "prompt"
apply = true
report = "text"
